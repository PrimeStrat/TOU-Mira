name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # BepInEx IL2CPP runtime version to bundle in platform packages
  BEPINEX_VERSION: "6.0.0-pre.2"

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    # Skip version-bump commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.cache/bepinex
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run the Cake script
        uses: cake-build/cake-action@v3
        env:
          GITHUB_ACTIONS_REF_TYPE: tag
          GITHUB_ACTIONS_REF_NAME: ${{ steps.version.outputs.version }}
        with:
          verbosity: Diagnostic

      - name: Copy plugin dependencies to build output
        run: |
          BUILD_OUT="TownOfUs/bin/Release"
          # MiraAPI and Reactor are BepInEx plugins that must ship alongside TownOfUsMira.dll.
          # dotnet build does not automatically copy them to the output folder in IL2CPP projects,
          # so we pull them explicitly from the NuGet cache.
          for PKG_DIR in \
            ~/.nuget/packages/allofus.miraapi \
            ~/.nuget/packages/reactor; do
            DLL=$(find "$PKG_DIR" -name '*.dll' -path '*/net6.0/*' ! -name '*Interop*' | head -1)
            if [ -n "$DLL" ]; then
              cp "$DLL" "${BUILD_OUT}/"
              echo "Copied $(basename $DLL) from $DLL"
            else
              echo "WARNING: No DLL found under $PKG_DIR"
            fi
          done

      - name: Download BepInEx IL2CPP runtimes
        run: |
          BEPINEX_BASE="https://github.com/BepInEx/BepInEx/releases/download/v${BEPINEX_VERSION}"
          mkdir -p bepinex-downloads
          curl -fSL "${BEPINEX_BASE}/BepInEx-Unity.IL2CPP-win-x86-${BEPINEX_VERSION}.zip" -o bepinex-downloads/win-x86.zip
          curl -fSL "${BEPINEX_BASE}/BepInEx-Unity.IL2CPP-win-x64-${BEPINEX_VERSION}.zip" -o bepinex-downloads/win-x64.zip
          curl -fSL "${BEPINEX_BASE}/BepInEx-Unity.IL2CPP-linux-x64-${BEPINEX_VERSION}.zip" -o bepinex-downloads/linux-x64.zip

      - name: Create platform packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_OUT="TownOfUs/bin/Release"

          # Collect all plugin DLLs from build output (mod + dependencies like MiraAPI, Reactor)
          PLUGIN_DLLS=$(find "${BUILD_OUT}" -maxdepth 1 -name '*.dll' -type f)
          echo "Plugin DLLs found:"
          echo "${PLUGIN_DLLS}"

          create_package() {
            local PLATFORM_LABEL="$1"
            local BEPINEX_ZIP="$2"
            local PKG_NAME="TouMira-v${VERSION}-${PLATFORM_LABEL}"
            local STAGING="staging/${PKG_NAME}"

            mkdir -p "${STAGING}"
            unzip -q "${BEPINEX_ZIP}" -d "${STAGING}"
            chmod -R u+rwX "${STAGING}"
            mkdir -p "${STAGING}/BepInEx/plugins"

            # Copy all plugin DLLs into the plugins folder
            echo "${PLUGIN_DLLS}" | while read -r dll; do
              [ -f "$dll" ] && cp "$dll" "${STAGING}/BepInEx/plugins/"
            done

            (cd "${STAGING}" && zip -r -q "../../${PKG_NAME}.zip" .)
            echo "Created ${PKG_NAME}.zip"
          }

          # Steam & Itch.io — Windows x86
          create_package "x86-steam-itch" "bepinex-downloads/win-x86.zip"

          # Epic Games Store & MS Store — Windows x64
          create_package "x64-epic-msstore" "bepinex-downloads/win-x64.zip"

          # Linux & macOS (Steam Deck / Proton) — Linux x64
          create_package "x64-linux-macOS" "bepinex-downloads/linux-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: "BY AU-Avengers (PrimeStrat Port)"
          generate_release_notes: true
          make_latest: true
          files: |
            TownOfUs/bin/Release/TownOfUsMira.dll
            TownOfUs/bin/Release/TownOfUsMira.*.nupkg
            TouMira-v${{ steps.version.outputs.version }}-x86-steam-itch.zip
            TouMira-v${{ steps.version.outputs.version }}-x64-epic-msstore.zip
            TouMira-v${{ steps.version.outputs.version }}-x64-linux-macOS.zip

      - name: Bump patch version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > version.txt

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to $(cat version.txt) [skip ci]"
          git push
